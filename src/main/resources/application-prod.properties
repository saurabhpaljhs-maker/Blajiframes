# ═══════════════════════════════════════════════════════════════
#  PROD Profile — GCP Ubuntu Production Server
#
#  Run karo:
#    java -jar balaji-frames.jar --spring.profiles.active=prod
#
#  Sab secrets GCP VM ke environment variables se aate hain:
#    export DB_URL="jdbc:mysql://localhost:3306/balajiframes?..."
#    export DB_USERNAME="balaji_db_user"
#    export DB_PASSWORD="your_strong_password"
#    export RAZORPAY_KEY_ID="rzp_live_XXXXXXXX"
#    export RAZORPAY_KEY_SECRET="your_secret"
#    export ADMIN_USERNAME="balaji_admin"
#    export ADMIN_PASSWORD="YourStrongPassword@2024"
#    export UPLOAD_DIR="/opt/balaji/uploads"
# ═══════════════════════════════════════════════════════════════

# ── MySQL Database ────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ── Upload Path (prod) ────────────────────────────────────────
# External folder — JAR ke bahar, read-write
app.upload.dir=${UPLOAD_DIR:/opt/balaji/uploads}

# ── Session Security ──────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# ── Error handling ────────────────────────────────────────────
server.error.include-stacktrace=never
server.error.include-message=never

# ── Logging (prod — minimal) ──────────────────────────────────
logging.level.com.balaji=WARN
logging.level.org.springframework=ERROR
logging.file.name=/opt/balaji/logs/app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
