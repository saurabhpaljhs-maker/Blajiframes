# ═══════════════════════════════════════════════════════
#  PROD Profile — MySQL Database (GCP Ubuntu Server)
#
#  Switch to prod:
#  java -jar balaji-frames.jar --spring.profiles.active=prod
#
#  MySQL setup on GCP Ubuntu:
#    sudo apt install mysql-server
#    sudo mysql -e "CREATE DATABASE balajiframes;"
#    sudo mysql -e "CREATE USER 'balaji'@'localhost' IDENTIFIED BY 'StrongPass@123';"
#    sudo mysql -e "GRANT ALL ON balajiframes.* TO 'balaji'@'localhost';"
# ═══════════════════════════════════════════════════════

spring.datasource.url=jdbc:mysql://localhost:3306/balajiframes?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=balaji
spring.datasource.password=StrongPass@123

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# validate = use existing tables, update = auto create/update tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console disabled in production
spring.h2.console.enabled=false

# Secure session cookies in production
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# Error pages
server.error.include-stacktrace=never
server.error.include-message=never
