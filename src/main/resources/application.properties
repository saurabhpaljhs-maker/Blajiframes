# ═══════════════════════════════════════════════
#  BALAJI PHOTO FRAMES — application.properties
# ═══════════════════════════════════════════════

spring.application.name=balaji-frames
server.port=8080

# ── ACTIVE PROFILE ──────────────────────────────
# dev  = H2 in-memory (local testing)
# prod = MySQL (GCP / production server)
spring.profiles.active=dev

# ── Thymeleaf ───────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── File Upload ─────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/opt/balaji/uploads

# ── Razorpay ────────────────────────────────────
# Get from dashboard.razorpay.com → Settings → API Keys
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── Business Info (shown in UI) ──────────────────
app.business.upi=8765673141@apl
app.business.phone=8299576949
app.business.name=BALAJI Photo Frames
app.business.address=Rajpur, Shamshabad Road, Agra 282001

# ── Admin Credentials (CHANGE before going live!) ─
app.admin.username=${ADMIN_USER}
app.admin.password=${ADMIN_PASS}

# ── Logging ─────────────────────────────────────
logging.level.com.balaji=DEBUG
logging.level.org.springframework.security=INFO
